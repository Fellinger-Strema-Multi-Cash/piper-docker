services:
  piper0:
    container_name: piper0
    image: ghcr.io/fellinger-strema-multi-cash/piper:latest
    restart: unless-stopped
    ports:
      - "5000:5000"
    healthcheck:
      test: ['CMD-SHELL', 'wget --output-document /dev/null http://127.0.0.1:5000/info || exit 1']
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 20s
      start_interval: 3s

  piper1:
    container_name: piper1
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5001:5000"
    healthcheck:
      test: ['CMD-SHELL', 'wget --output-document /dev/null http://127.0.0.1:5000/info || exit 1']
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 20s
      start_interval: 3s
