services:
  piper:
    container_name: piper
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"
    healthcheck:
      test: ['CMD-SHELL', 'wget --output-document /dev/null http://127.0.0.1:5000/info || exit 1']
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 20s
      start_interval: 3s
