name: 'Build and Publish Image'

on:
  workflow_call:
    inputs:
      version:
        description: 'app version (e.g. v1.0.0)'
        required: true
        type: string
      description:
        description: 'app description'
        required: true
        type: string
      repo_ref:
        description: 'version/branch (e.g. v0.1.1, main, etc.)'
        required: true
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to the Container registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY }}/Fellinger-Strema-Multi-Cash/piper
          labels: |
            org.opencontainers.image.title=piper
            org.opencontainers.image.version=${{ inputs.version }}
            org.opencontainers.image.description=${{ inputs.description }}

      - name: Build and Publish Image
        uses: docker/build-push-action@v7.1.0
        env:
          SOURCE_DATE_EPOCH: 0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PIPER_REPO_REF=${{ inputs.repo_ref }}
